    - 5000000000.0
    - 10000000000.0
    - 20000000000.0
    - 50000000000.0
    - 100000000000.0
    apply_hann: true
    detrend: true
  advanced_1e11:
    enabled: true
    input_npz: lhs_phase_1e11_loggrid.npz
    window_caps:
    - 1000000.0
    - 2000000.0
    - 5000000.0
    - 10000000.0
    - 20000000.0
    - 50000000.0
    - 100000000.0
    - 200000000.0
    - 500000000.0
    - 1000000000.0
    - 2000000000.0
    - 5000000000.0
