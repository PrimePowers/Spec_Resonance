paths:
  repo_root: .
  data_dir: .
  output_dir: .
generation:
  scale_1e9:
    enabled: true
    x_min: 10
    x_max: 1000000000
    n_log_grid: 20000
    segment_size: 5000000
    out_prefix: lhs_phase_1e9
  scale_1e10:
    enabled: true
    x_min: 10
    x_max: 10000000000
    n_log_grid: 16000
    segment_size: 10000000
    out_prefix: lhs_phase_1e10
  scale_1e11:
    enabled: true
    x_min: 10
    x_max: 100000000000
    n_log_grid: 12000
    segment_size: 20000000
    out_prefix: lhs_phase_1e11
analysis:
  global_1e10:
    enabled: true
    input_npz: lhs_phase_1e10_loggrid.npz
    known_zeros_count: 10
    band_half_width: 0.35
    random_trials: 400
    window_random_trials: 250
    jitter_trials: 300
    random_low: 10.0
    random_high: 55.0
    shift_min: -3.0
    shift_max: 3.0
    shift_steps: 121
    jitters:
    - 0.2
    - 0.4
    - 0.6
    seeds:
      random: 2026
      jitter_02: 2027
      jitter_04: 2028
      jitter_06: 2029
      window_random: 2030
    apply_hann: true
    detrend: true
  global_1e11:
    enabled: true
    input_npz: lhs_phase_1e11_loggrid.npz
    known_zeros_count: 10
    band_half_width: 0.35
    random_trials: 400
    window_random_trials: 250
    jitter_trials: 300
    random_low: 10.0
    random_high: 55.0
    shift_min: -3.0
    shift_max: 3.0
    shift_steps: 121
    jitters:
    - 0.2
    - 0.4
    - 0.6
    seeds:
      random: 2026
      jitter_02: 2027
      jitter_04: 2028
      jitter_06: 2029
      window_random: 2030
    apply_hann: true
    detrend: true
  first20_1e11:
    enabled: true
    input_npz: lhs_phase_1e11_loggrid.npz
    local_random_trials: 400
    window_caps:
    - 1000000.0
    - 2000000.0
    - 5000000.0
    - 10000000.0
    - 20000000.0
    - 50000000.0
    - 100000000.0
    - 200000000.0
    - 500000000.0
    - 1000000000.0
