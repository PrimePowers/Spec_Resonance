    - 20000000000.0
    - 50000000000.0
    - 100000000000.0
    first10_half_window: 0.8
    top_n_blind: 20
    top_n_near_zero: 3
    apply_hann: true
  first30_fixed:
    enabled: true
    input_npz: lhs_phase_1e11_loggrid.npz
    first30_count: 30
    apply_hann: true
  lppl_first30:
    enabled: true
    input_csv: matched_first30_lhs_phase.csv
    first30_count: 30
angles:
  build_upto_1e10:
    enabled: true
    input: lhs_phase_1e10_loggrid.csv
    output: angles_rebuilt_upto_1e10.csv
    xmax: 10000000000.0
  evaluate_resonance_v2:
    enabled: true
    input: angles_rebuilt_upto_1e10.csv
    summary_out: angles_eval_summary_v2.csv
    peaks_out: angles_eval_peaks_v2.csv
    matches_out: angles_eval_matches_v2.csv
    low_omega: 10.0
    high_omega: 55.0
    top_k: 15
    peak_distance: 20
    tol: 0.75
    match_series: theta_norm
  high_precision_pipeline:
    enabled: true
    input: angles_rebuilt_upto_1e10.csv
    output_theta: theta_norm.csv
    output_psi: psi_norm.csv
    output_plot: angles_lomb_scargle_spectrum.png
    omega_min: 10.0
    omega_max: 55.0
    num_omega: 5000
    apply_hann: false
figures:
  paper_figures_1e11:
    enabled: true
    npz_file: lhs_phase_1e11_loggrid.npz
    score_file: analysis_first20_scoreboard_1e11.csv
    window_file: analysis_first20_window_scores_1e11.csv
    omega_min: 10.0
    omega_max: 55.0
    first10_count: 10
operator_core:
  canonical_theta:
    window:
    - 18.2
    - 20.45
    edge_width: 0.32
    resid_dim: 3
  canonical_psi:
    window:
    - 18.2
    - 20.45
    edge_width: 0.32
    resid_dim: 4
  sweep_theta_27:
    left_edges:
    - 18.15
    - 18.2
    - 18.25
    right_edges:
    - 20.4
    - 20.45
    - 20.5
    edge_widths:
    - 0.26
    - 0.32
    - 0.38
    resid_dim: 3
